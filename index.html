<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Teaching Whiteboard </title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Gloria+Hallelujah&family=Patrick+Hand&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], caveat: ['Caveat','cursive'], patrick: ['Patrick Hand','cursive'], gloria: ['Gloria Hallelujah','cursive'] } } } };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        .canvas-container-wrapper {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color, #f8fafc);
            transition: background-color 0.3s;
        }
        
        html.dark .canvas-container-wrapper { --bg-color: #0f172a; }
        .dark .toolbar, .dark .popup { background: rgba(30, 41, 59, 0.95); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .dark .tool-divider { background-color: #334155; }
        .dark .tool-btn { color: #94a3b8; }
        .dark .tool-btn:hover { background: #334155; color: white; }
        .dark .tool-btn.active { background: #14b8a6; color: white; }

        .bg-dots { background-image: radial-gradient(var(--line-color, #cbd5e1) 1.5px, transparent 1.5px); }
        .bg-ruled { background-image: repeating-linear-gradient(transparent, transparent calc(100% - 2px), var(--line-color, #cbd5e1) 100%); }
        .bg-grid { background-image: linear-gradient(to right, var(--line-color, #e2e8f0) 1px, transparent 1px), linear-gradient(to bottom, var(--line-color, #e2e8f0) 1px, transparent 1px); }
        .bg-music { background-image: repeating-linear-gradient(transparent, transparent 10%, var(--line-color, #cbd5e1) 10%, var(--line-color, #cbd5e1) 12%, transparent 12%, transparent 20%); }
        
        html.dark .bg-dots, html.dark .bg-ruled, html.dark .bg-grid, html.dark .bg-music { --line-color: #1e293b; }
        
        .toolbar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 100px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 8px;
            display: flex; gap: 4px; z-index: 100; align-items: center;
        }
        .tool-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.2s; }
        .tool-btn:hover { background-color: #f1f5f9; transform: translateY(-2px); }
        .tool-btn.active { background-color: #14b8a6; color: white; }
        .tool-divider { width: 1px; height: 24px; background-color: #e2e8f0; margin: 0 4px; }
        
        .popup {
            position: absolute; bottom: calc(100% + 15px); left: 50%; transform: translateX(-50%) translateY(10px);
            background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            opacity: 0; pointer-events: none; transition: all 0.3s;
        }
        .popup.active { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 16px; }
        .color-btn { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .color-btn:hover { transform: scale(1.15); }
        .color-preset { background-color: var(--preset-color); }
    </style>
</head>
<body>

    <div class="canvas-container-wrapper bg-dots" id="canvasContainer">
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <button class="tool-btn active" data-tool="select" title="Select (V)"><i data-lucide="mouse-pointer-2"></i></button>
        <button class="tool-btn" data-tool="pan" title="Pan Canvas (Space)"><i data-lucide="hand"></i></button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="draw" title="Pen (P)"><i data-lucide="pen"></i></button>
        <button class="tool-btn" data-tool="marker" title="Marker (M)"><i data-lucide="highlighter"></i></button>
        <button class="tool-btn" data-tool="erase" title="Eraser (E)"><i data-lucide="eraser"></i></button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="shape" data-shape="rectangle" title="Rectangle"><i data-lucide="square"></i></button>
        <button class="tool-btn" data-tool="shape" data-shape="circle" title="Circle"><i data-lucide="circle"></i></button>
        <button class="tool-btn" data-tool="shape" data-shape="triangle" title="Triangle"><i data-lucide="triangle"></i></button>
        <button class="tool-btn" data-tool="shape" data-shape="line" title="Line"><i data-lucide="minus"></i></button>
        <button class="tool-btn" data-tool="arrow" title="Arrow (A)"><i data-lucide="arrow-up-right"></i></button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="text" title="Text (T)"><i data-lucide="type"></i></button>
        <button class="tool-btn" data-tool="sticky" title="Sticky Note (S)"><i data-lucide="sticky-note"></i></button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="laser" title="Laser Pointer (L)"><i data-lucide="zap"></i></button>
        <div class="tool-divider"></div>
        <button class="tool-btn" id="btnTheme" title="Toggle Dark/Light Mode"><i data-lucide="moon"></i></button>
        <button class="tool-btn" id="btnBg" title="Switch Theme Background (B)"><i data-lucide="layout-grid"></i></button>
        <div class="tool-divider"></div>
        
        <div style="position: relative;">
            <button class="tool-btn" id="btnColorTrigger" title="Colors (C)">
                <div id="currentColorIndicator" style="width: 24px; height: 24px; border-radius: 50%; background-color: #0f172a; border: 2px solid #e2e8f0;"></div>
            </button>
            <div class="popup color-grid" id="colorPopup">
                <div class="color-btn color-preset active" data-color="#0f172a" style="--preset-color: #0f172a;"></div>
                <div class="color-btn color-preset" data-color="#475569" style="--preset-color: #475569;"></div>
                <div class="color-btn color-preset" data-color="#94a3b8" style="--preset-color: #94a3b8;"></div>
                <div class="color-btn color-preset" data-color="#ef4444" style="--preset-color: #ef4444;"></div>
                <div class="color-btn color-preset" data-color="#f97316" style="--preset-color: #f97316;"></div>
                <div class="color-btn color-preset" data-color="#f59e0b" style="--preset-color: #f59e0b;"></div>
                <div class="color-btn color-preset" data-color="#eab308" style="--preset-color: #eab308;"></div>
                <div class="color-btn color-preset" data-color="#84cc16" style="--preset-color: #84cc16;"></div>
                <div class="color-btn color-preset" data-color="#22c55e" style="--preset-color: #22c55e;"></div>
                <div class="color-btn color-preset" data-color="#14b8a6" style="--preset-color: #14b8a6;"></div>
                <div class="color-btn color-preset" data-color="#06b6d4" style="--preset-color: #06b6d4;"></div>
                <div class="color-btn color-preset" data-color="#3b82f6" style="--preset-color: #3b82f6;"></div>
                <div class="color-btn color-preset" data-color="#6366f1" style="--preset-color: #6366f1;"></div>
                <div class="color-btn color-preset" data-color="#a855f7" style="--preset-color: #a855f7;"></div>
                <div class="color-btn color-preset" data-color="#ec4899" style="--preset-color: #ec4899;"></div>
                <div class="color-btn color-preset" data-color="#ffffff" style="--preset-color: #ffffff;"></div>
            </div>
        </div>

        <div class="tool-divider"></div>
        <button class="tool-btn" id="btnUndo" title="Undo (Ctrl+Z)"><i data-lucide="undo-2"></i></button>
        <button class="tool-btn" id="btnRedo" title="Redo (Ctrl+Y)"><i data-lucide="redo-2"></i></button>
        <button class="tool-btn" id="btnClear" title="Clear Board"><i data-lucide="trash-2"></i></button>
        <button class="tool-btn" id="btnExport" title="Export (PDF/PNG)"><i data-lucide="download"></i></button>
    </div>

    <!-- Toast Logic -->
    <div id="toast" class="fixed top-4 right-4 bg-gray-900 text-white px-4 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-y-[-200%] opacity-0 flex items-center gap-3 z-50">
        <i data-lucide="info" class="w-5 h-5 text-brand-500"></i>
        <span id="toastMessage" class="text-sm font-medium">Notification</span>
    </div>

    <script>
        lucide.createIcons();

        const AppState = {
            currentTool: 'draw', 
            currentShape: 'rectangle',
            color: '#0f172a',
            strokeWidth: 4,
            undoStack: [],
            redoStack: [],
            isDarkMode: false
        };

        const canvasContainer = document.getElementById('canvasContainer');
        const canvas = new fabric.Canvas('mainCanvas', {
            isDrawingMode: true,
            selection: false,
            preserveObjectStacking: true,
            width: window.innerWidth,
            height: window.innerHeight
        });

        // Initialize Zero-Latency Native Brush
        canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
        canvas.freeDrawingBrush.color = AppState.color;
        canvas.freeDrawingBrush.width = AppState.strokeWidth;

        function hexToRgba(hex, alpha) {
            if (hex === '#ffffff' && !AppState.isDarkMode) { hex = '#0f172a'; }
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            gsap.to(toast, { y: 0, opacity: 1, duration: 0.4, ease: "back.out(1.5)" });
            setTimeout(() => { gsap.to(toast, { y: -100, opacity: 0, duration: 0.3, ease: "power2.in" }); }, 3000);
        }

        /* --- THEMES & BACKGROUNDS --- */
        const bgClasses = ['bg-dots', 'bg-ruled', 'bg-grid', 'bg-music', 'bg-blank'];
        let currentBgIndex = 0;
        
        document.getElementById('btnBg').addEventListener('click', () => {
            canvasContainer.classList.remove(bgClasses[currentBgIndex]);
            currentBgIndex = (currentBgIndex + 1) % bgClasses.length;
            canvasContainer.classList.add(bgClasses[currentBgIndex]);
            updateBackgroundEngine();
            showToast("Template changed");
        });

        document.getElementById('btnTheme').addEventListener('click', () => {
            AppState.isDarkMode = !AppState.isDarkMode;
            if(AppState.isDarkMode) {
                document.documentElement.classList.add('dark');
                if (AppState.color === '#0f172a') {
                    AppState.color = '#ffffff'; 
                    document.getElementById('currentColorIndicator').style.backgroundColor = '#ffffff';
                }
            } else {
                document.documentElement.classList.remove('dark');
                if (AppState.color === '#ffffff') {
                    AppState.color = '#0f172a';
                    document.getElementById('currentColorIndicator').style.backgroundColor = '#0f172a';
                }
            }
            applyToolState();
            showToast(AppState.isDarkMode ? "Dark Mode Enabled" : "Light Mode Enabled");
        });

        /* --- INFINITE CANVAS ENGINE --- */
        function updateBackgroundEngine() {
            const vpt = canvas.viewportTransform;
            const bgClass = bgClasses[currentBgIndex];
            if (bgClass === 'bg-blank') return;
            
            // Sync CSS background with Canvas pan and zoom for endless illusion
            canvasContainer.style.backgroundPosition = `${vpt[4]}px ${vpt[5]}px`;
            
            const zoom = vpt[0];
            if (bgClass === 'bg-dots') canvasContainer.style.backgroundSize = `${20 * zoom}px ${20 * zoom}px`;
            else if (bgClass === 'bg-ruled') canvasContainer.style.backgroundSize = `100% ${32 * zoom}px`;
            else if (bgClass === 'bg-grid') canvasContainer.style.backgroundSize = `${40 * zoom}px ${40 * zoom}px`;
            else if (bgClass === 'bg-music') canvasContainer.style.backgroundSize = `100% ${80 * zoom}px`;
        }

        canvas.on('mouse:wheel', function(opt) {
            let delta = opt.e.deltaY;
            let zoom = canvas.getZoom();
            zoom *= 0.999 ** delta;
            if (zoom > 20) zoom = 20;
            if (zoom < 0.1) zoom = 0.1;
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            opt.e.preventDefault(); opt.e.stopPropagation();
            updateBackgroundEngine();
        });

        let isPanningCanvas = false;
        let lastPanX, lastPanY;

        /* --- TOOLBAR INTERACTION & STATE --- */
        const toolBtns = document.querySelectorAll('.tool-btn[data-tool]');
        toolBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                AppState.currentTool = btn.getAttribute('data-tool');
                if (AppState.currentTool === 'shape') {
                    AppState.currentShape = btn.getAttribute('data-shape');
                }
                toolBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyToolState();
            });
        });

        const colorTrigger = document.getElementById('btnColorTrigger');
        const colorPopup = document.getElementById('colorPopup');
        colorTrigger.addEventListener('click', (e) => {
            colorPopup.classList.toggle('active'); e.stopPropagation();
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#toolbar')) colorPopup.classList.remove('active');
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                AppState.color = btn.getAttribute('data-color');
                document.getElementById('currentColorIndicator').style.backgroundColor = AppState.color;
                colorPopup.classList.remove('active');
                applyToolState();
                
                const activeObj = canvas.getActiveObject();
                if (activeObj) {
                    if (activeObj.type === 'i-text') activeObj.set({ fill: AppState.color });
                    else if (activeObj.fill && activeObj.fill.indexOf('rgba') === -1 && activeObj.fill !== 'transparent') activeObj.set({ fill: AppState.color });
                    else activeObj.set({ stroke: AppState.color });
                    canvas.renderAll(); saveState();
                }
            });
        });

        function applyToolState() {
            canvas.isDrawingMode = false;
            canvas.selection = false;
            canvas.defaultCursor = 'default';
            canvas.getObjects().forEach(o => { o.selectable = false; o.evented = false; });

            if (AppState.currentTool === 'select' || AppState.currentTool === 'text') {
                canvas.selection = true;
                canvas.defaultCursor = AppState.currentTool === 'text' ? 'text' : 'default';
                canvas.getObjects().forEach(o => { o.selectable = true; o.evented = true; });
            } else if (AppState.currentTool === 'draw') {
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush.color = AppState.color;
                canvas.freeDrawingBrush.width = AppState.strokeWidth / canvas.getZoom();
            } else if (AppState.currentTool === 'marker') {
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush.color = hexToRgba(AppState.color, 0.4);
                canvas.freeDrawingBrush.width = (AppState.strokeWidth * 6) / canvas.getZoom();
            } else if (AppState.currentTool === 'arrow' || AppState.currentTool === 'shape') {
                canvas.defaultCursor = 'crosshair';
            } else if (AppState.currentTool === 'laser') {
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush.color = '#ef4444';
                canvas.freeDrawingBrush.width = 6 / canvas.getZoom();
            } else if (AppState.currentTool === 'pan') {
                canvas.defaultCursor = 'grab';
            } else if (AppState.currentTool === 'erase') {
                canvas.defaultCursor = 'url(https://cdn-icons-png.flaticon.com/32/3426/3426027.png) 0 32, auto';
                canvas.getObjects().forEach(o => { o.selectable = false; o.evented = true; }); // Catch events
            }
        }

        /* --- MOUSE LOGIC FOR NON-DRAW TOOLS --- */
        let isPointerDown = false;
        let arrowPath = null;
        let arrowPoints = [];
        let drawingPoints = [];
        let originX = 0, originY = 0;
        let drawingShapeObj = null;
        const fonts = ['Caveat', 'Patrick Hand', 'Gloria Hallelujah'];
        
        let smartSnapTimeout = null;
        let isSmartSnapped = false;

        function resetSmartSnap() {
            clearTimeout(smartSnapTimeout);
            smartSnapTimeout = setTimeout(() => {
                if (AppState.currentTool === 'draw' && drawingPoints.length > 10) {
                    const shape = detectShape(drawingPoints);
                    if (shape.type !== 'none') {
                        isSmartSnapped = true;
                        canvas.clearContext(canvas.contextTop);
                        
                        let obj;
                        const props = { stroke: AppState.color, strokeWidth: AppState.strokeWidth / (canvas.getZoom()||1), fill: 'transparent', originX:'left', originY:'top' };
                        
                        if (shape.type === 'line') obj = new fabric.Line([shape.x1, shape.y1, shape.x2, shape.y2], props);
                        else if (shape.type === 'circle') obj = new fabric.Circle({ left: shape.left, top: shape.top, radius: shape.radius, ...props });
                        else if (shape.type === 'rectangle') obj = new fabric.Rect({ left: shape.left, top: shape.top, width: shape.width, height: shape.height, ...props });
                        else if (shape.type === 'triangle') obj = new fabric.Polygon([{x: shape.width/2, y: 0}, {x: shape.width, y: shape.height}, {x: 0, y: shape.height}], { left: shape.left, top: shape.top, ...props });
                        else if (shape.type === 'diamond') obj = new fabric.Polygon([{x: shape.width/2, y: 0}, {x: shape.width, y: shape.height/2}, {x: shape.width/2, y: shape.height}, {x: 0, y: shape.height/2}], { left: shape.left, top: shape.top, ...props });
                        else if (shape.type === 'pentagon') obj = new fabric.Polygon([{x: shape.width/2, y: 0}, {x: shape.width, y: shape.height*0.4}, {x: shape.width*0.8, y: shape.height}, {x: shape.width*0.2, y: shape.height}, {x: 0, y: shape.height*0.4}], { left: shape.left, top: shape.top, ...props });
                        
                        if (obj) {
                            canvas.add(obj);
                            canvas.renderAll();
                            showToast(`Smart Snap: ${shape.type.charAt(0).toUpperCase() + shape.type.slice(1)}`);
                        }
                    }
                }
            }, 600); // Trigger after 600ms of holding still
        }

        canvas.on('mouse:down', function(opt) {
            const evt = opt.e;
            drawingPoints = [];
            isSmartSnapped = false;
            if (canvas.isDrawingMode) {
                drawingPoints.push(canvas.getPointer(evt));
                resetSmartSnap();
            }

            if (AppState.currentTool === 'shape') {
                isPointerDown = true;
                const pointer = canvas.getPointer(evt);
                originX = pointer.x; originY = pointer.y;
                
                const props = { stroke: AppState.color, strokeWidth: AppState.strokeWidth / (canvas.getZoom()||1), fill: 'transparent', originX:'left', originY:'top', selectable: false, evented: false };
                
                if (AppState.currentShape === 'rectangle') drawingShapeObj = new fabric.Rect({ left: originX, top: originY, width: 0, height: 0, ...props });
                else if (AppState.currentShape === 'circle') drawingShapeObj = new fabric.Circle({ left: originX, top: originY, radius: 0, ...props });
                else if (AppState.currentShape === 'triangle') drawingShapeObj = new fabric.Triangle({ left: originX, top: originY, width: 0, height: 0, ...props });
                else if (AppState.currentShape === 'line') drawingShapeObj = new fabric.Line([originX, originY, originX, originY], props);
                
                if (drawingShapeObj) canvas.add(drawingShapeObj);
                return;
            }

            if (AppState.currentTool === 'pan' || evt.altKey || evt.code === 'Space' || evt.which === 2) {
                isPanningCanvas = true;
                canvas.defaultCursor = 'grabbing';
                lastPanX = evt.clientX; lastPanY = evt.clientY;
                canvas.isDrawingMode = false;
                return;
            }

            const pointer = canvas.getPointer(evt);

            if (AppState.currentTool === 'erase' && opt.target) {
                canvas.remove(opt.target); saveState(); return;
            }

            if (AppState.currentTool === 'sticky') {
                const colors = ['#fef08a', '#bbf7d0', '#bfdbfe', '#fbcfe8'];
                const stickyColor = colors[Math.floor(Math.random() * colors.length)];
                const text = new fabric.IText('Sticky Note', {
                    left: pointer.x, top: pointer.y, fontFamily: 'Patrick Hand', fontSize: 28, fill: '#334155',
                    backgroundColor: stickyColor, padding: 20, width: 250, splitByGrapheme: true,
                    shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.2)', blur: 10, offsetY: 5 }),
                    originX: 'center', originY: 'center', cursorColor: '#334155', cornerColor: '#14b8a6', cornerStyle: 'circle'
                });
                canvas.add(text); canvas.setActiveObject(text); text.enterEditing(); text.selectAll(); saveState(); return;
            }

            if (AppState.currentTool === 'text') {
                if (opt.target && opt.target.type === 'i-text') return;
                const text = new fabric.IText('Type here...', {
                    left: pointer.x, top: pointer.y, fontFamily: fonts[Math.floor(Math.random() * fonts.length)],
                    fill: AppState.color, fontSize: 32 / (canvas.getZoom() || 1), originX: 'left', originY: 'top',
                    cursorColor: AppState.color, transparentCorners: false, cornerColor: '#14b8a6', cornerStyle: 'circle'
                });
                canvas.add(text); canvas.setActiveObject(text); text.enterEditing(); text.selectAll(); saveState(); return;
            }

            if (AppState.currentTool === 'arrow') {
                isPointerDown = true;
                arrowPoints = [pointer.x, pointer.y, pointer.x, pointer.y];
                arrowPath = new fabric.Path(`M ${pointer.x} ${pointer.y} L ${pointer.x} ${pointer.y}`, {
                    stroke: AppState.color, strokeWidth: AppState.strokeWidth * 1.5, fill: '',
                    selectable: false, evented: false
                });
                canvas.add(arrowPath);
            }
        });

        canvas.on('mouse:move', function(opt) {
            if (isPanningCanvas) {
                const vpt = canvas.viewportTransform;
                vpt[4] += opt.e.clientX - lastPanX;
                vpt[5] += opt.e.clientY - lastPanY;
                canvas.requestRenderAll();
                lastPanX = opt.e.clientX; lastPanY = opt.e.clientY;
                updateBackgroundEngine();
                return;
            }

            const pointer = canvas.getPointer(opt.e);
            
            if (AppState.currentTool === 'shape' && drawingShapeObj && isPointerDown) {
                if (AppState.currentShape === 'line') {
                    drawingShapeObj.set({ x2: pointer.x, y2: pointer.y });
                } else {
                    let w = Math.abs(pointer.x - originX);
                    let h = Math.abs(pointer.y - originY);
                    
                    if (AppState.currentShape === 'circle') {
                        let radius = Math.max(w, h)/2;
                        drawingShapeObj.set({ radius: radius, left: originX + (pointer.x < originX ? -radius*2 : 0), top: originY + (pointer.y < originY ? -radius*2 : 0) });
                    } else {
                        drawingShapeObj.set({ width: w, height: h, left: pointer.x < originX ? pointer.x : originX, top: pointer.y < originY ? pointer.y : originY });
                    }
                }
                canvas.renderAll();
                return;
            }

            if (canvas.isDrawingMode && opt.e.buttons === 1) {
                drawingPoints.push(pointer);
                if (!isSmartSnapped) resetSmartSnap();
            }

            if (AppState.currentTool === 'erase' && opt.e.buttons === 1 && opt.target) {
                canvas.remove(opt.target); saveState(); return;
            }

            if (AppState.currentTool === 'arrow' && arrowPath && isPointerDown) {
                arrowPoints[2] = pointer.x; arrowPoints[3] = pointer.y;
                
                const dx = arrowPoints[2] - arrowPoints[0], dy = arrowPoints[3] - arrowPoints[1];
                const angle = Math.atan2(dy, dx), headlen = 25 / canvas.getZoom();
                const pathStr = `M ${arrowPoints[0]} ${arrowPoints[1]} L ${arrowPoints[2]} ${arrowPoints[3]} M ${arrowPoints[2]} ${arrowPoints[3]} L ${arrowPoints[2] - headlen * Math.cos(angle - Math.PI / 6)} ${arrowPoints[3] - headlen * Math.sin(angle - Math.PI / 6)} M ${arrowPoints[2]} ${arrowPoints[3]} L ${arrowPoints[2] - headlen * Math.cos(angle + Math.PI / 6)} ${arrowPoints[3] - headlen * Math.sin(angle + Math.PI / 6)}`;
                
                canvas.remove(arrowPath);
                arrowPath = new fabric.Path(pathStr, { stroke: AppState.color, strokeWidth: AppState.strokeWidth * 1.5, fill: '', selectable: false, evented: false });
                canvas.add(arrowPath);
                canvas.renderAll();
            }
        });

        canvas.on('mouse:up', function() {
            clearTimeout(smartSnapTimeout);
            if (isPanningCanvas) { isPanningCanvas = false; applyToolState(); }
            if (AppState.currentTool === 'arrow' && arrowPath) {
                arrowPath.setCoords(); arrowPath.set({ selectable: true, evented: true, objectCaching: true });
                arrowPath = null; isPointerDown = false; saveState();
            }
            if (AppState.currentTool === 'shape' && drawingShapeObj) {
                drawingShapeObj.set({ selectable: true, evented: true, objectCaching: true });
                drawingShapeObj = null; isPointerDown = false; saveState();
            }
        });

        /* --- PROFESSIONAL HYBRID SHAPE RECOGNITION (ShortStraw + DP + Pro UX) --- */
        function Point(x, y) { this.x = x; this.y = y; }
        function distance(p1, p2) { return Math.hypot(p2.x - p1.x, p2.y - p1.y); }
        function pathLength(points) { let d = 0; for (let i = 1; i < points.length; i++) d += distance(points[i - 1], points[i]); return d; }
        
        function resample(points, n) {
            let I = pathLength(points) / (n - 1), D = 0.0, newpoints = [points[0]];
            for (let i = 1; i < points.length; i++) {
                let d = distance(points[i - 1], points[i]);
                if ((D + d) >= I) {
                    let qx = points[i - 1].x + ((I - D) / d) * (points[i].x - points[i - 1].x);
                    let qy = points[i - 1].y + ((I - D) / d) * (points[i].y - points[i - 1].y);
                    let q = new Point(qx, qy);
                    newpoints.push(q); points.splice(i, 0, q); D = 0.0;
                } else D += d;
            }
            if (newpoints.length == n - 1) newpoints.push(points[points.length - 1]);
            return newpoints;
        }

        function sqSegDist(p, p1, p2) {
            let x = p1.x, y = p1.y, dx = p2.x - x, dy = p2.y - y;
            if (dx !== 0 || dy !== 0) {
                let t = ((p.x - x) * dx + (p.y - y) * dy) / (dx * dx + dy * dy);
                if (t > 1) { x = p2.x; y = p2.y; } else if (t > 0) { x += dx * t; y += dy * t; }
            }
            dx = p.x - x; dy = p.y - y;
            return dx * dx + dy * dy;
        }
        function simplifyDPStep(points, first, last, sqTol, simplified) {
            let maxSqD = sqTol, index = -1;
            for (let i = first + 1; i < last; i++) {
                let sqD = sqSegDist(points[i], points[first], points[last]);
                if (sqD > maxSqD) { index = i; maxSqD = sqD; }
            }
            if (maxSqD > sqTol) {
                if (index - first > 1) simplifyDPStep(points, first, index, sqTol, simplified);
                simplified.push(points[index]);
                if (last - index > 1) simplifyDPStep(points, index, last, sqTol, simplified);
            }
        }
        function simplifyShape(points, tolerance) {
            let sqTol = tolerance * tolerance;
            let simplified = [points[0]];
            simplifyDPStep(points, 0, points.length - 1, sqTol, simplified);
            simplified.push(points[points.length - 1]);
            return simplified;
        }

        function detectShape(rawPoints) {
            if (!rawPoints || rawPoints.length < 10) return { type: 'none' };
            let points = rawPoints.map(p => new Point(p.x, p.y));
            
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (let p of points) {
                minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
                maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
            }
            let width = maxX - minX, height = Math.max(maxY - minY, 1);
            let pathLen = pathLength(points);
            if(pathLen === 0) return {type: 'none'};
            let startEndDist = distance(points[0], points[points.length - 1]);

            let resampled = resample(points, 64);

            // 1. Forgiving Line Check
            if (startEndDist > pathLength(resampled) * 0.8) {
                return { type: 'line', x1: resampled[0].x, y1: resampled[0].y, x2: resampled[resampled.length-1].x, y2: resampled[resampled.length-1].y };
            }

            // 2. Closed shapes (Forgiving distance check)
            if (startEndDist < pathLen * 0.35 || startEndDist < 70) {
                let cx = (minX + maxX)/2, cy = (minY + maxY)/2;
                
                let radii = resampled.map(p => distance(p, new Point(cx, cy)));
                let avgR = radii.reduce((a,b)=>a+b,0)/radii.length;
                let varR = radii.reduce((a,b)=>a+Math.pow(b-avgR,2),0)/radii.length;
                let circleScore = Math.sqrt(varR)/avgR;

                // Shoelace formula for drawn polygon area (Very robust heuristic)
                let area = 0;
                for (let i=0; i<resampled.length-1; i++) {
                    area += (resampled[i].x*resampled[i+1].y - resampled[i+1].x*resampled[i].y);
                }
                area = Math.abs(area/2);
                let bbArea = width * height;
                let fillRatio = area / (bbArea || 1);
                
                let simplified = simplifyShape(resampled, Math.max(width, height) * 0.12);
                if (simplified.length > 2 && distance(simplified[0], simplified[simplified.length-1]) < Math.max(width, height)*0.2) {
                    simplified.pop(); 
                }
                let corners = simplified.length;

                // Circle ~0.78 fill, Tri ~0.5 fill, Rect ~1.0 fill
                if (circleScore < 0.25 && fillRatio > 0.65) return { type: 'circle', left: minX, top: minY, radius: Math.max(width, height)/2 };

                if (corners === 3 || (fillRatio > 0.3 && fillRatio < 0.65 && corners < 5)) return { type: 'triangle', left: minX, top: minY, width, height };
                if (corners === 5 || corners === 6) return { type: 'pentagon', left: minX, top: minY, width, height };
                if (fillRatio > 0.8) return { type: 'rectangle', left: minX, top: minY, width, height };
                if (corners === 4) {
                    let isDiamond = true;
                    for(let pt of simplified) {
                        let nearCorner = 
                            (Math.abs(pt.x - minX) < width*0.3 && Math.abs(pt.y - minY) < height*0.3) ||
                            (Math.abs(pt.x - maxX) < width*0.3 && Math.abs(pt.y - minY) < height*0.3) ||
                            (Math.abs(pt.x - minX) < width*0.3 && Math.abs(pt.y - maxY) < height*0.3) ||
                            (Math.abs(pt.x - maxX) < width*0.3 && Math.abs(pt.y - maxY) < height*0.3);
                        if (nearCorner) isDiamond = false;
                    }
                    if (isDiamond) return { type: 'diamond', left: minX, top: minY, width, height };
                    return { type: 'rectangle', left: minX, top: minY, width, height };
                }
                
                return { type: 'rectangle', left: minX, top: minY, width, height };
            }
            return { type: 'none' };
        }

        canvas.on('path:created', function(opt) {
            const path = opt.path;
            
            // Pro UX: Only keep Sloppy paths if Smart Snap DID NOT fire!
            if (AppState.currentTool === 'draw' && isSmartSnapped) {
                canvas.remove(path); // Toss out the messy line!
                saveState();
                return; // We already added the perfect shape in resetSmartSnap()
            }

            if (AppState.currentTool === 'laser') {
                path.set({ shadow: new fabric.Shadow({ color: '#ef4444', blur: 15 }) });
                gsap.to(path, { opacity: 0, duration: 1.5, ease: "power2.out", onComplete: () => { canvas.remove(path); canvas.requestRenderAll(); }});
                return;
            }

            // If we reach here, it was a fast draw with no long press. Keep it as-is!
            saveState();
        });

        /* --- HISTORY & EXPORT --- */
        let historyProcessing = false;
        function saveState() {
            if (historyProcessing) return;
            AppState.undoStack.push(JSON.stringify(canvas));
            AppState.redoStack = []; document.getElementById('btnUndo').style.opacity=1; document.getElementById('btnRedo').style.opacity=0.5;
        }
        function loadHistory(stackPop, stackPush, btn1, btn2) {
            if (stackPop.length === 0) return;
            historyProcessing = true;
            stackPush.push(JSON.stringify(canvas));
            canvas.loadFromJSON(stackPop.pop(), () => {
                canvas.renderAll(); historyProcessing = false; applyToolState();
                document.getElementById(btn1).style.opacity = stackPop.length ? 1 : 0.5;
                document.getElementById(btn2).style.opacity = 1;
            });
        }
        document.getElementById('btnUndo').addEventListener('click', () => loadHistory(AppState.undoStack, AppState.redoStack, 'btnUndo', 'btnRedo'));
        document.getElementById('btnRedo').addEventListener('click', () => loadHistory(AppState.redoStack, AppState.undoStack, 'btnRedo', 'btnUndo'));

        document.getElementById('btnClear').addEventListener('click', () => {
            if(confirm('Clear the entire infinite whiteboard?')) { canvas.clear(); saveState(); showToast("Board cleared"); }
        });

        document.getElementById('btnExport').addEventListener('click', () => {
            showToast("Exporting...");
            setTimeout(() => {
                let prevVpt = canvas.viewportTransform.slice();
                canvas.setViewportTransform([1,0,0,1,0,0]); // Export unscaled
                const dataUrl = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 2 });
                canvas.setViewportTransform(prevVpt); // Restore
                
                const link = document.createElement('a'); link.download = 'smart-teaching-board.png'; link.href = dataUrl; link.click();
            }, 100);
        });

        window.addEventListener('keydown', (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || canvas.getActiveObject()?.isEditing) return;
            const tools = { 'v': 'select', 'p': 'draw', 'm': 'marker', 'a': 'arrow', 'e': 'erase', 't': 'text', 'c': 'colorPopup', 's': 'sticky', 'l': 'laser' };
            if (tools[e.key.toLowerCase()]) {
                if (e.key.toLowerCase() === 'c') document.getElementById('btnColorTrigger').click();
                else document.querySelector(`.tool-btn[data-tool="${tools[e.key.toLowerCase()]}"]`).click();
            }
            if (e.ctrlKey || e.metaKey) {
                if (e.key.toLowerCase() === 'z') e.shiftKey ? document.getElementById('btnRedo').click() : document.getElementById('btnUndo').click();
                if (e.key.toLowerCase() === 'y') document.getElementById('btnRedo').click();
            }
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const actives = canvas.getActiveObjects();
                if (actives.length) { actives.forEach(obj => canvas.remove(obj)); canvas.discardActiveObject(); saveState(); }
            }
        });

        window.addEventListener('resize', () => { canvas.setWidth(window.innerWidth); canvas.setHeight(window.innerHeight); canvas.renderAll(); });
        
        applyToolState();
        document.querySelector('.tool-btn[data-tool="draw"]').click(); // Force select pen
        showToast("Welcome to Smart Teaching Whiteboard!");
    </script>
</body>
</html>
